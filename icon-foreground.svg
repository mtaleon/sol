<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108">
  <!-- Adaptive icon safe zone: 54dp center, content within 66dp circle -->
  <!-- Foreground: white Sudoku grid with a "9" digit -->

  <!-- 3x3 Sudoku grid (centered in 108x108, within safe zone 18-90) -->
  <g stroke="#ffffff" fill="none">
    <!-- Outer border -->
    <rect x="22" y="22" width="64" height="64" rx="4" stroke-width="3.5"/>

    <!-- Box dividers (3x3) -->
    <line x1="43.33" y1="22" x2="43.33" y2="86" stroke-width="2.5"/>
    <line x1="64.67" y1="22" x2="64.67" y2="86" stroke-width="2.5"/>
    <line x1="22" y1="43.33" x2="86" y2="43.33" stroke-width="2.5"/>
    <line x1="22" y1="64.67" x2="86" y2="64.67" stroke-width="2.5"/>

    <!-- Cell dividers (thin) -->
    <line x1="29.11" y1="22" x2="29.11" y2="86" stroke-width="0.6" opacity="0.5"/>
    <line x1="36.22" y1="22" x2="36.22" y2="86" stroke-width="0.6" opacity="0.5"/>
    <line x1="50.44" y1="22" x2="50.44" y2="86" stroke-width="0.6" opacity="0.5"/>
    <line x1="57.56" y1="22" x2="57.56" y2="86" stroke-width="0.6" opacity="0.5"/>
    <line x1="71.78" y1="22" x2="71.78" y2="86" stroke-width="0.6" opacity="0.5"/>
    <line x1="78.89" y1="22" x2="78.89" y2="86" stroke-width="0.6" opacity="0.5"/>

    <line x1="22" y1="29.11" x2="86" y2="29.11" stroke-width="0.6" opacity="0.5"/>
    <line x1="22" y1="36.22" x2="86" y2="36.22" stroke-width="0.6" opacity="0.5"/>
    <line x1="22" y1="50.44" x2="86" y2="50.44" stroke-width="0.6" opacity="0.5"/>
    <line x1="22" y1="57.56" x2="86" y2="57.56" stroke-width="0.6" opacity="0.5"/>
    <line x1="22" y1="71.78" x2="86" y2="71.78" stroke-width="0.6" opacity="0.5"/>
    <line x1="22" y1="78.89" x2="86" y2="78.89" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- Sample digits scattered in cells for visual interest -->
  <g fill="#ffffff" font-family="-apple-system, 'Segoe UI', sans-serif" font-weight="600" text-anchor="middle" dominant-baseline="central" opacity="0.9">
    <text x="25.5" y="25.5" font-size="5">5</text>
    <text x="32.6" y="25.5" font-size="5">3</text>
    <text x="50.4" y="25.5" font-size="5">7</text>

    <text x="25.5" y="32.6" font-size="5">6</text>
    <text x="43.3" y="32.6" font-size="5">1</text>
    <text x="50.4" y="32.6" font-size="5">9</text>
    <text x="57.5" y="32.6" font-size="5">5</text>

    <text x="32.6" y="39.7" font-size="5">9</text>
    <text x="36.2" y="39.7" font-size="5">8</text>

    <text x="25.5" y="50.4" font-size="5">8</text>
    <text x="50.4" y="50.4" font-size="5">6</text>
    <text x="82.4" y="50.4" font-size="5">3</text>

    <text x="25.5" y="57.5" font-size="5">4</text>
    <text x="43.3" y="57.5" font-size="5">8</text>
    <text x="57.5" y="57.5" font-size="5">3</text>
    <text x="82.4" y="57.5" font-size="5">1</text>

    <text x="25.5" y="64.6" font-size="5">7</text>
    <text x="50.4" y="64.6" font-size="5">2</text>
    <text x="82.4" y="64.6" font-size="5">6</text>

    <text x="32.6" y="71.8" font-size="5">6</text>
    <text x="71.8" y="71.8" font-size="5">2</text>
    <text x="75.3" y="71.8" font-size="5">8</text>

    <text x="43.3" y="78.9" font-size="5">4</text>
    <text x="50.4" y="78.9" font-size="5">1</text>
    <text x="57.5" y="78.9" font-size="5">9</text>
    <text x="82.4" y="78.9" font-size="5">5</text>

    <text x="50.4" y="82.5" font-size="5">8</text>
    <text x="75.3" y="82.5" font-size="5">7</text>
    <text x="78.9" y="82.5" font-size="5">9</text>
  </g>
</svg>
