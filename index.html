<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#5294e2">
  <meta name="description" content="Classic Sudoku puzzle game">
  <title>Sudoku Game</title>
  <link rel="stylesheet" href="platforms/web-dom/styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body>
  <!-- Layer 1: Header (status) -->
  <header>
    <div class="header-left">
      <button id="pause-btn" data-i18n-aria="header.pause" aria-label="Pause">⏸</button>
    </div>
    <div class="header-center">
      <span id="difficulty-label">Medium</span>
    </div>
    <div class="header-right">
      <span id="timer">00:00</span>
      <span id="mistakes"></span>
    </div>
  </header>

  <!-- Layer 2: Board (focus) -->
  <div id="sudoku-grid"></div>

  <!-- Layer 3: Keypad (input) -->
  <div id="number-pad">
    <button data-number="1">1</button>
    <button data-number="2">2</button>
    <button data-number="3">3</button>
    <button data-number="4">4</button>
    <button data-number="5">5</button>
    <button data-number="6">6</button>
    <button data-number="7">7</button>
    <button data-number="8">8</button>
    <button data-number="9">9</button>
  </div>

  <!-- Layer 4: Tools (operations) -->
  <div id="tools">
    <button id="undo-btn" class="tool-btn" data-i18n-title="tool.undo.title" title="Undo (long-press: Redo)">
      <span class="tool-icon">↩</span>
      <span class="tool-label" data-i18n="tool.undo">Undo</span>
    </button>
    <button id="notes-btn" class="tool-btn">
      <span class="tool-icon">✎</span>
      <span class="tool-label" data-i18n="tool.notes">Notes</span>
    </button>
    <button id="hint-btn" class="tool-btn">
      <span class="tool-icon">💡</span>
      <span class="tool-label" data-i18n="tool.hint">Hint</span>
    </button>
    <button id="clear-btn" class="tool-btn" data-i18n-title="tool.clear.title" title="Clear (long-press: Clear notes)">
      <span class="tool-icon">✕</span>
      <span class="tool-label" data-i18n="tool.clear">Clear</span>
    </button>
  </div>

  <!-- Pause Overlay -->
  <div id="pause-overlay">
    <h2 data-i18n="pause.title">Paused</h2>
    <div class="pause-actions">
      <button id="resume-btn" class="primary" data-i18n="pause.resume">Resume</button>
      <button id="pause-restart-btn" data-i18n="pause.restart">Restart</button>
      <button id="pause-new-game-btn" data-i18n="pause.newGame">New Game</button>
      <button id="pause-settings-btn" data-i18n="pause.settings">Settings</button>
    </div>
  </div>

  <!-- Difficulty Selector Modal -->
  <div id="difficulty-modal">
    <div class="modal-content">
      <h2 data-i18n="difficulty.title">Select Difficulty</h2>
      <div class="difficulty-options">
        <button class="difficulty-btn" data-difficulty="EASY">
          <span class="difficulty-name" data-i18n="difficulty.easy">Easy</span>
          <span class="difficulty-desc" data-i18n="difficulty.clues" data-i18n-param-n="45">45 clues</span>
        </button>
        <button class="difficulty-btn" data-difficulty="MEDIUM">
          <span class="difficulty-name" data-i18n="difficulty.medium">Medium</span>
          <span class="difficulty-desc" data-i18n="difficulty.clues" data-i18n-param-n="38">38 clues</span>
        </button>
        <button class="difficulty-btn" data-difficulty="HARD">
          <span class="difficulty-name" data-i18n="difficulty.hard">Hard</span>
          <span class="difficulty-desc" data-i18n="difficulty.clues" data-i18n-param-n="32">32 clues</span>
        </button>
      </div>
      <button id="close-difficulty-modal" class="close-btn" data-i18n="difficulty.cancel">Cancel</button>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal">
    <div class="modal-content">
      <h2 data-i18n="settings.title">Settings</h2>
      <div id="settings-list"></div>
      <button id="settings-done" class="settings-done" data-i18n="settings.done">Done</button>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container"></div>

  <script type="module" src="app.js"></script>
  <script>
    // Service worker temporarily disabled for testing
    // if ('serviceWorker' in navigator) {
    //   navigator.serviceWorker.register('sw.js').catch(err => {
    //     console.log('Service worker registration failed:', err);
    //   });
    // }
  </script>
</body>
</html>
