<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku - Final Test</title>
  <link rel="stylesheet" href="platforms/web-dom/styles.css">
</head>
<body>
  <h1 style="text-align: center; color: #344861; margin: 20px 0;">
    Sudoku - 確認當前效果
  </h1>
  <div style="text-align: center; margin: 20px; padding: 10px; background: #fffbea; border: 2px solid #ffd700; border-radius: 8px;">
    <p>請點擊格子或下方數字按鈕，告訴我你看到的效果是否正確</p>
  </div>
  <script type="module" src="app.js"></script>
  <script>
    // Copy the exact HTML structure
    document.body.innerHTML += `
      <div style="display: flex; flex-direction: column; align-items: center;">
        <header style="display: flex; justify-content: space-between; align-items: center; width: clamp(300px, 90vw, 500px); margin-bottom: 20px;">
          <div>
            <div id="timer">00:00</div>
            <div id="moves">Moves: 0</div>
          </div>
        </header>
        <div id="sudoku-grid"></div>
        <div id="number-pad">
          <button data-number="1">1</button>
          <button data-number="2">2</button>
          <button data-number="3">3</button>
          <button data-number="4">4</button>
          <button data-number="5">5</button>
          <button data-number="6">6</button>
          <button data-number="7">7</button>
          <button data-number="8">8</button>
          <button data-number="9">9</button>
          <button id="clear-btn">✕</button>
        </div>
        <div id="controls">
          <button id="new-game-btn">New Game</button>
          <button id="hint-btn">💡 Hint</button>
          <button id="undo-btn">Undo</button>
          <button id="redo-btn">Redo</button>
          <button id="notes-btn">✎ Notes</button>
        </div>
      </div>
    `;
  </script>
</body>
</html>
