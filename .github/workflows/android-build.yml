name: Android Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Signed release builds (requires secrets)
      - name: Decode Keystore
        if: startsWith(github.ref, 'refs/tags/') && env.ANDROID_KEYSTORE_B64 != ''
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/app/release.keystore

      - name: Create keystore properties
        if: startsWith(github.ref, 'refs/tags/') && env.ANDROID_KEYSTORE_PASSWORD != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
            > android/keystore.properties

      - name: Build signed AAB (Play Store)
        if: startsWith(github.ref, 'refs/tags/')
        run: cd android && ./gradlew bundleRelease

      - name: Build signed APK
        if: startsWith(github.ref, 'refs/tags/')
        run: cd android && ./gradlew assembleRelease

      - name: Upload signed AAB
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          body: |
            ## Android Release

            **Play Store**: Upload `app-release.aab` to Play Console
            **Sideload**: Install `app-release.apk` directly
            **Debug**: Development build with debugging enabled

            See [DEPLOY.md](./DEPLOY.md) for full deployment instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
