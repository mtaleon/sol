name: Android Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Signed release builds (requires secrets)
      - name: Decode Keystore
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_B64" ]; then
            echo "::error::ANDROID_KEYSTORE_B64 secret is not set"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/app/release.keystore
          echo "Keystore decoded: $(wc -c < android/app/release.keystore) bytes"

      - name: Create keystore properties
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::One or more signing secrets are not set"
            exit 1
          fi
          printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$KEYSTORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
            > android/keystore.properties

      - name: Verify signing setup
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "keystore.properties exists: $(test -f android/keystore.properties && echo YES || echo NO)"
          echo "release.keystore exists: $(test -f android/app/release.keystore && echo YES || echo NO)"
          echo "keystore.properties keys: $(grep -o '^[^=]*' android/keystore.properties 2>/dev/null || echo MISSING)"

      - name: Build signed AAB (Play Store)
        if: startsWith(github.ref, 'refs/tags/')
        run: cd android && ./gradlew bundleRelease

      - name: Build signed APK
        if: startsWith(github.ref, 'refs/tags/')
        run: cd android && ./gradlew assembleRelease

      - name: Upload signed AAB
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Verify build outputs for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "=== All APKs and AABs ==="
          find android -type f \( -name "*debug*.apk" -o -name "*release*.apk" -o -name "*.aab" \) -maxdepth 6 -exec ls -lh {} \;
          echo ""
          echo "=== What will be uploaded ==="
          echo "Debug APKs: $(find android/app/build/outputs/apk/debug -name "*debug*.apk" 2>/dev/null | wc -l)"
          echo "Release AABs: $(find android/app/build/outputs/bundle/release -name "*.aab" 2>/dev/null | wc -l)"
          echo "Release APKs (NOT uploaded): $(find android/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | wc -l)"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/*debug*.apk
            android/app/build/outputs/bundle/release/*.aab
          body: |
            ## Android Release

            **Play Store**: Upload the `.aab` file to Play Console (manual upload required)
            **Debug APK**: Development build for testing (debugging enabled)

            ⚠️ **Important Notes:**
            - Creating this GitHub Release does NOT publish to Google Play. The `.aab` must still be uploaded manually to Play Console.
            - Debug APK may not install over the Play Store version (different signing key). Uninstall the Play Store version first if needed.

            See [DEPLOY.md](./DEPLOY.md) for full deployment instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
